name: Notion to Hashnode Auto-Frontmatter
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notion to Markdown
        uses: ega4432/notion-to-markdown-action@v0.4.1
        with:
          notion-api-key: ${{ secrets.NOTION_TOKEN }}
          notion-db-id: ${{ secrets.NOTION_DATABASE_ID }}
          output_path: "posts"
          filter_property: "Status"
          filter_value: "Done"
          filename_property: "Slug"

      - name: Inject Frontmatter Automatically
        run: |
          for file in posts/*.md; do
            # Get filename without extension to use as Slug
            slug=$(basename "$file" .md)
            # Create a temporary file with frontmatter
            echo "---" > tmp_file
            echo "title: ${slug//-/ }" >> tmp_file # Replaces dashes with spaces for title
            echo "slug: $slug" >> tmp_file
            echo "tags: [\"General\"]" >> tmp_file # Default tag
            echo "---" >> tmp_file
            cat "$file" >> tmp_file
            mv tmp_file "$file"
          done

      - name: Publish to Hashnode
        uses: raunakgurud09/hashnode-publish@v2
        with:
          hashnode_key: ${{ secrets.HASHNODE_TOKEN }}
          file: "posts/**/*.md"
