name: Notion to Hashnode Auto-Frontmatter
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notion to Markdown
        uses: ega4432/notion-to-markdown-action@v0.4.1
        env:
          # This action requires these as ENV variables, not just inputs
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: "posts"
          filename_property: "Slug"

      - name: Inject Frontmatter Automatically
        run: |
          if [ -d "posts" ]; then
            for file in posts/*.md; do
              slug=$(basename "$file" .md)
              echo -e "---\ntitle: ${slug//-/ }\nslug: $slug\ntags: [\"General\"]\n---\n$(cat "$file")" > "$file"
            done
          else
            echo "No posts found to process."
          fi

      - name: Publish to Hashnode
        uses: raunakgurud09/hashnode-publish@v2
        with:
          hashnode_key: ${{ secrets.HASHNODE_TOKEN }}
          file: "posts/**/*.md"
