name: Notion to Hashnode Final
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notion to Markdown
        uses: ega4432/notion-to-markdown-action@v0.4.1
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: "posts"
          filename_property: "Slug"

      - name: Check if posts exist
        id: check_files
        run: |
          if [ -d "posts" ] && [ "$(ls -A posts/*.md 2>/dev/null)" ]; then
            echo "files_found=true" >> $GITHUB_OUTPUT
          else
            echo "files_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Inject Frontmatter and Publish
        if: steps.check_files.outputs.files_found == 'true'
        env:
          HASHNODE_KEY: ${{ secrets.HASHNODE_TOKEN }}
        run: |
          for file in posts/*.md; do
            slug=$(basename "$file" .md)
            # 1. Add Frontmatter to the file
            content=$(cat "$file")
            echo -e "---\ntitle: ${slug//-/ }\nslug: $slug\ntags: [\"General\"]\n---\n$content" > "$file"
            
            # 2. Publish this specific file using a curl command (Native 2026 API)
            # This replaces the buggy action with a direct, reliable API call
            echo "Publishing $slug..."
            curl -X POST https://api.hashnode.com/ \
              -H "Content-Type: application/json" \
              -H "Authorization: $HASHNODE_KEY" \
              -d "{\"query\":\"mutation { createBlogPost(publicationId: \\\"${{ secrets.HASHNODE_PUBLICATION_ID }}\\\", input: { title: \\\"${slug//-/ }\\\", contentMarkdown: $(echo "$content" | jq -Rs .), tags: [{ name: \\\"General\\\", slug: \\\"general\\\" }] }) { code message success } }\"}"
          done
