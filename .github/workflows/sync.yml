name: Notion to Hashnode Final
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Notion to Markdown
        uses: ega4432/notion-to-markdown-action@v0.4.1
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: "posts"
          filename_property: "Slug"

      - name: Check if posts exist
        id: check_files
        run: |
          if [ -d "posts" ] && [ "$(ls -A posts/*.md 2>/dev/null)" ]; then
            echo "files_found=true" >> $GITHUB_OUTPUT
          else
            echo "files_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Inject Frontmatter and Publish
        if: steps.check_files.outputs.files_found == 'true'
        env:
          HASHNODE_KEY: ${{ secrets.HASHNODE_TOKEN }}
          PUB_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
        run: |
          for file in posts/*.md; do
            slug=$(basename "$file" .md)
            # 1. Clean content for JSON (escaping quotes/newlines)
            content=$(cat "$file" | jq -Rs .)
            title="${slug//-/ }"

            echo "Publishing $slug to Hashnode..."
            
            # 2. Use the NEW 2026 Endpoint (gql.hashnode.com)
            curl -X POST https://gql.hashnode.com \
              -H "Content-Type: application/json" \
              -H "Authorization: $HASHNODE_KEY" \
              --data "{
                \"query\": \"mutation PublishPost(\$input: PublishPostInput!) { publishPost(input: \$input) { post { id url slug } } }\",
                \"variables\": {
                  \"input\": {
                    \"publicationId\": \"$PUB_ID\",
                    \"title\": \"$title\",
                    \"contentMarkdown\": $content,
                    \"slug\": \"$slug\"
                  }
                }
              }"
          done
